services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - motivation-redis:/data
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      args:
        MOTIVATION_BUILD_VERSION: 6d91528
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    command:
      - sh
      - -lc
      - >-
        export DATABASE_URL="$$(printf '%s' "$$DATABASE_URL" | sed 's/@postgres:/@vedamatch-portal-db-scqe9y:/')" &&
        pnpm prisma migrate deploy && pnpm prisma db seed && node dist/main.js
    environment:
      NODE_ENV: production
      API_PORT: ${API_PORT}
      WEB_ORIGIN: ${WEB_ORIGIN}
      API_PUBLIC_URL: ${API_PUBLIC_URL}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_PRIVATE_KEY_BASE64: ${JWT_PRIVATE_KEY_BASE64}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS}
      DATABASE_URL: ${DATABASE_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      MOTIVATION_AI_BASE_URL: ${MOTIVATION_AI_BASE_URL:-${NEUROGATE_BASE_URL:-https://r-api.vibemod.pro/v1}}
      MOTIVATION_AI_API_KEY: ${MOTIVATION_AI_API_KEY:-${NEUROGATE_API_KEY}}
      MOTIVATION_TEXT_MODEL: ${MOTIVATION_TEXT_MODEL:-${NEUROGATE_MODEL:-deepseek-v4-flash}}
      MOTIVATION_IMAGE_CONTROLLER_MODEL: gpt-5.5
      MOTIVATION_LANGUAGES: ${MOTIVATION_LANGUAGES:-ru,en,hi}
      MOTIVATION_DAILY_CRON: ${MOTIVATION_DAILY_CRON:-0 4 * * *}
      NOMINATIM_USER_AGENT: ${NOMINATIM_USER_AGENT}
    networks:
      - dokploy-network
    expose:
      - "4000"
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://127.0.0.1:4000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      API_INTERNAL_URL: ${API_INTERNAL_URL}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - dokploy-network
    expose:
      - "3000"

networks:
  dokploy-network:
    external: true

volumes:
  motivation-redis:
